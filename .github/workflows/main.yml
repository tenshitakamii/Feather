name: Build Windows EXE

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Rust Toolchain
      uses: dtolnay/rust-toolchain@stable

    - name: Download and Setup libmpv (Windows Dev Files)
      shell: pwsh
      run: |
        # 1. Tạo thư mục tạm
        New-Item -ItemType Directory -Force -Path D:\mpv-dev
        
        # 2. Tự động gọi API của GitHub để lấy link bản mpv-dev mới nhất (Tránh lỗi link chết/404)
        $apiResult = Invoke-RestMethod -Uri "https://api.github.com/repos/shinchiro/mpv-winbuild-cmake/releases/latest"
        $asset = $apiResult.assets | Where-Object { $_.name -like "mpv-dev-x86_64-*.7z" } | Select-Object -First 1
        $url = $asset.browser_download_url
        
        Write-Host "Đang tiến hành tải thư viện từ: $url"
        Invoke-WebRequest -Uri $url -OutFile D:\mpv-dev\mpv-dev.7z
        
        # 3. Giải nén gói vừa tải
        7z x D:\mpv-dev\mpv-dev.7z -oD:\mpv-dev -y
        
        # 4. Tìm vị trí file mpv.lib để liên kết với Rust
        $libFile = Get-ChildItem -Path D:\mpv-dev -Filter "mpv.lib" -Recurse | Select-Object -First 1
        if ($null -eq $libFile) {
            Write-Error "Không tìm thấy file mpv.lib sau khi giải nén!"
            exit 1
        }
        $libDir = $libFile.DirectoryName
        Write-Host "Đã tìm thấy thư mục lib tại: $libDir"
        
        # 5. Ghi vào biến môi trường theo chuẩn GitHub Actions dành cho PowerShell (pwsh)
        "LIB=$libDir" | Out-File -FilePath $env:GITHUB_ENV -Append
        "RUSTFLAGS=-L native=$libDir" | Out-File -FilePath $env:GITHUB_ENV -Append

    - name: Build Feather Frontend
      run: |
        cd feather_frontend
        cargo build --release

    - name: Copy libmpv DLL to Release Folder
      shell: pwsh
      run: |
        # Quét tìm file .dll để copy vào chung một thư mục chạy với file .exe
        $dllFile = Get-ChildItem -Path D:\mpv-dev -Filter "*mpv*.dll" -Recurse | Select-Object -First 1
        if ($null -eq $dllFile) {
            Write-Error "Không tìm thấy file mpv DLL!"
            exit 1
        }
        Copy-Item $dllFile.FullName -Destination "feather_frontend\target\release\"

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: feather-windows-exe
        path: |
          feather_frontend/target/release/*.exe
          feather_frontend/target/release/*.dll
