name: Build Windows EXE

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Rust Toolchain
      uses: dtolnay/rust-toolchain@stable

    - name: Download and Setup libmpv (Windows Dev Files)
      shell: pwsh
      run: |
        $ErrorActionPreference = 'Stop'
        $devDir = "D:\mpv-dev"
        New-Item -ItemType Directory -Force -Path $devDir | Out-Null
        
        Write-Host "Tìm link tải thư viện mpv-dev mới nhất..."
        $apiResult = Invoke-RestMethod -Uri "https://api.github.com/repos/shinchiro/mpv-winbuild-cmake/releases/latest"
        $asset = $apiResult.assets | Where-Object { $_.name -like "mpv-dev-x86_64-*.7z" } | Select-Object -First 1
        
        Write-Host "Đang tải: $($asset.browser_download_url)"
        Invoke-WebRequest -Uri $asset.browser_download_url -OutFile "$devDir\mpv-dev.7z"
        
        Write-Host "Đang giải nén..."
        7z x "$devDir\mpv-dev.7z" -o"$devDir" -y | Out-Null
        
        # Mấu chốt nằm ở đây: Tìm file libmpv.dll.a (hoặc bất kỳ file .a nào của mpv)
        $importLib = Get-ChildItem -Path $devDir -Filter "*mpv*.a" -Recurse | Select-Object -First 1
        
        if ($null -ne $importLib) {
            $libDir = $importLib.DirectoryName
            $targetLib = Join-Path -Path $libDir -ChildPath "mpv.lib"
            
            # Đổi tên file .a thành mpv.lib để chiều lòng MSVC linker của Rust
            Copy-Item $importLib.FullName -Destination $targetLib
            Write-Host "Đã đổi tên $($importLib.Name) thành mpv.lib thành công tại $libDir"
            
            # Ghi đường dẫn chuẩn vào biến môi trường cho Rust
            "LIB=$libDir" | Out-File -FilePath $env:GITHUB_ENV -Append
            "RUSTFLAGS=-L native=$libDir" | Out-File -FilePath $env:GITHUB_ENV -Append
        } else {
            Write-Error "Không tìm thấy file liên kết (.a) nào trong gói mpv-dev!"
            exit 1
        }

    - name: Build Feather Frontend
      run: |
        cd feather_frontend
        cargo build --release

    - name: Copy libmpv DLL to Release Folder
      shell: pwsh
      run: |
        $dllFile = Get-ChildItem -Path D:\mpv-dev -Filter "*mpv*.dll" -Recurse | Select-Object -First 1
        Copy-Item $dllFile.FullName -Destination "feather_frontend\target\release\"

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: feather-windows-exe
        path: |
          feather_frontend/target/release/*.exe
          feather_frontend/target/release/*.dll
